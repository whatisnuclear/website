<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
    <link rel="stylesheet" href="../dist/reveal.css">
    <link rel="stylesheet" id="theme" href="../dist/theme/night.css">
    <style>
      .reveal .footer {
        position: absolute;
        bottom: 1em;
        left: 1em;
        font-size: 0.4em;
        color: #949494;
      }

      p.frontmatter {
        margin-top: 5px;
        margin-bottom: 5px;
      }

      p.attribution {
        font-size: 0.5em;
        color: #444444;
      }

      h4.rxtypes {
        margin-top: 20px;
      }

      .full {
        height: 100%;
        width: 100%;
      }
      .bottom_r {
        bottom: 0px;
        right: 0px;
        font-size: 0.5em;
        position: absolute;
      }
    </style>
  </head>

  <body>
    <div class="reveal">
      <div class="slides">{{ content }}</div>
      <div class="footer">CC-BY-NC whatisnuclear.com</div>
    </div>

    <script src="../dist/reveal.js"></script>
    <script src="../dist/reveal.js-plugins/notes/notes.js"></script>
    <script src="../dist/reveal.js-plugins/zoom/zoom.js"></script>
    <script>
      // Apply customization values passed in as query params. Slide decks
      // using this layout may include any subset of these IDs on their title
      // slide, so every lookup is null-safe.
      (function applyParams() {
        const themes = {
          black: 'black.css',
          white: 'white.css',
          league: 'league.css',
          sky: 'sky.css',
          beige: 'beige.css',
          simple: 'simple.css',
          solarized: 'solarized.css',
          blood: 'blood.css',
          night: 'night.css',
          moon: 'moon.css',
        };
        const params = new URLSearchParams(window.location.search);
        const setText = (id, val) => {
          const el = document.getElementById(id);
          if (el) el.innerText = val;
        };
        const hideIfBlank = (id, val) => {
          const el = document.getElementById(id);
          if (el && !val) el.style.visibility = 'hidden';
        };

        const eventVal = params.get('event') || '';
        const presenterVal = params.get('presenter') || '';
        setText('event', eventVal);
        setText('presenter', presenterVal);
        setText('date', params.get('date') || new Date().toLocaleDateString());
        setText('pres-title', params.get('title') || '{{ page.title }}');
        hideIfBlank('event-c', eventVal);
        hideIfBlank('presenter-c', presenterVal);

        const themeLink = document.getElementById('theme');
        if (themeLink) {
          themeLink.href =
            '../dist/theme/' + themes[params.get('theme') || 'night'];
        }
      })();

      Reveal.initialize({
        mouseWheel: true,
        plugins: [RevealNotes, RevealZoom],
        width: 960 * 1.9,
        height: 700 * 1.5,
        hash: true,
        slideNumber: 'c',
      });
    </script>
  </body>
</html>
